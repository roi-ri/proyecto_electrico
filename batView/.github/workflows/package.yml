name: Build And Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - batView

jobs:
  package-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install wxwidgets

      - name: Configure
        run: cmake -S . -B build-release -DBATVIEW_ENABLE_WX=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-release --config Release

      - name: Package
        run: cpack --config build-release/CPackConfig.cmake

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: batview-macos
          path: dist/*
          if-no-files-found: error

  package-ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++ make pkg-config libwxgtk3.2-dev libgtk-3-dev

      - name: Configure
        run: cmake -S . -B build-release -DBATVIEW_ENABLE_WX=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-release --config Release

      - name: Package
        run: cpack --config build-release/CPackConfig.cmake

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: batview-ubuntu
          path: dist/*
          if-no-files-found: error

  package-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-wxwidgets
            mingw-w64-ucrt-x86_64-nsis

      - name: Configure
        run: cmake -S . -B build-release -G Ninja -DBATVIEW_ENABLE_WX=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build-release

      - name: Package
        run: cpack --config build-release/CPackConfig.cmake

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: batview-windows
          path: dist/*
          if-no-files-found: error
