name: Build And Package

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - batView

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  package-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          brew update
          brew install wxwidgets

      - name: Configure
        working-directory: batView
        run: cmake -S . -B build-release -DBATVIEW_ENABLE_WX=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: batView
        run: cmake --build build-release --config Release

      - name: Package
        working-directory: batView
        run: cpack --config build-release/CPackConfig.cmake

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: batview-macos
          path: batView/dist/*
          if-no-files-found: error

  package-ubuntu:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake g++ make pkg-config libwxgtk3.2-dev libgtk-3-dev

      - name: Configure
        working-directory: batView
        run: cmake -S . -B build-release -DBATVIEW_ENABLE_WX=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: batView
        run: cmake --build build-release --config Release

      - name: Package
        working-directory: batView
        run: cpack --config build-release/CPackConfig.cmake

      - name: Build AppImage
        working-directory: batView
        run: |
          sudo apt install -y libfuse2 patchelf
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          cp build-release/batView AppDir/usr/bin/batView
          cp assets/BatView.png AppDir/usr/share/icons/hicolor/256x256/apps/batview.png

          cat > AppDir/usr/share/applications/batview.desktop <<'EOF'
          [Desktop Entry]
          Type=Application
          Name=batView
          Exec=batView
          Icon=batview
          Categories=Utility;
          Terminal=false
          EOF

          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage appimagetool-x86_64.AppImage

          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --desktop-file AppDir/usr/share/applications/batview.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/batview.png

          ./appimagetool-x86_64.AppImage AppDir dist/batView-linux-x86_64.AppImage

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: batview-ubuntu
          path: batView/dist/*
          if-no-files-found: error

  package-windows:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            mingw-w64-ucrt-x86_64-toolchain
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-ninja
            mingw-w64-ucrt-x86_64-wxwidgets
            mingw-w64-ucrt-x86_64-nsis

      - name: Configure
        working-directory: batView
        run: cmake -S . -B build-release -G Ninja -DBATVIEW_ENABLE_WX=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build
        working-directory: batView
        run: cmake --build build-release

      - name: Package
        working-directory: batView
        run: cpack --config build-release/CPackConfig.cmake

      - name: Build portable ZIP with runtime DLLs
        working-directory: batView
        run: |
          mkdir -p portable/assets
          cp build-release/batView.exe portable/
          cp assets/BatView.png portable/assets/
          cp assets/batView.gif portable/assets/

          for dll in libgcc_s_seh-1.dll libstdc++-6.dll libwinpthread-1.dll; do
            cp "/ucrt64/bin/${dll}" portable/ || true
          done

          cp /ucrt64/bin/libwx*.dll portable/ || true
          cp /ucrt64/bin/zlib1.dll portable/ || true
          cp /ucrt64/bin/libpng16-16.dll portable/ || true
          cp /ucrt64/bin/libjpeg-8.dll portable/ || true
          cp /ucrt64/bin/libtiff-6.dll portable/ || true

          mkdir -p dist
          tar -a -c -f dist/batView-windows-portable.zip -C portable .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: batview-windows
          path: batView/dist/*
          if-no-files-found: error
